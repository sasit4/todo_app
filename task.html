<!DOCTYPE html>
<html>

<head>

    <title>Task Page</title>

    <!-- CSS -->
    <link rel="stylesheet" href="task.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <!-- TOP BAR -->
        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 id="showDate"></h5>

            <button class="btn btn-danger btn-sm" onclick="closePage()">
                <i class="bi bi-x-lg"></i>
            </button>

        </div>

        <h5 class="task">Today Task</h5>

        <p id="taskCount"></p>

        <!-- ADD TASK -->
        <div class="input-group mb-3">

            <input type="text" id="taskInput" class="form-control" placeholder="Enter task">

            <button class="btn btn-success" onclick="addTask()">
                Add
            </button>

        </div>

        <!-- TASK LIST -->
        <ul id="taskList" class="list-group mb-3">
        </ul>

        <!-- SUBMIT -->
        <button class="btn btn-primary w-100" onclick="submitTask()">
            Submit
        </button>

    </div>

    <script src="task.js">

    </script>

</body>

</html>
